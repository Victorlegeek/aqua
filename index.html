<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aqua">
  <meta name="theme-color" content="#f4f7fb">
  <meta name="description" content="Suis ta consommation d'eau et reçois des rappels pour rester hydraté.">

  <title>Aqua 💧</title>

  <!-- Manifest PWA -->
  <link rel="manifest" href="/manifest.json">

  <!-- Icône pour iOS (à créer ou mettre une image PNG bleue) -->
  <link rel="apple-touch-icon" href="/icons/icon-180.png">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="splash">
    <div class="splash-logo">💧</div>
    <div class="splash-name">Aqua</div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="app">

    <header>
      <div class="header-left">
        <h1>Aqua <span>💧</span></h1>
        <div class="header-date" id="date-label">Chargement...</div>
      </div>
      <button class="btn-settings" onclick="ouvrirSettings()" aria-label="Paramètres"><img src="settings-icon.png" alt=""></button>
    </header>

    <div class="circle-wrap">
      <div class="circle-container">
        <div class="circle-bg">
          <div class="wave" id="wave"></div>
        </div>
        <div class="circle-text">
          <div class="circle-ml" id="circle-ml">0</div>
          <div class="circle-unit">ml aujourd'hui</div>
          <div class="circle-pct" id="circle-pct">0%</div>
        </div>
      </div>
      <div class="circle-goal">
        Objectif : <span id="circle-goal-val">2000</span> ml
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-restant">2000 ml</div>
        <div class="stat-label">Restant</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-pct">0%</div>
        <div class="stat-label">Fait</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-verres">0</div>
        <div class="stat-label">Verres</div>
      </div>
    </div>

    <div class="section-title">Ajouter rapidement</div>

    <div class="quick-btns">
      <button class="btn-add" onclick="ajouterEau(250)">
        <div class="add-ml">250 ml</div>
        <div class="add-label">Verre</div>
      </button>
      <button class="btn-add" onclick="ajouterEau(330)">
        <div class="add-ml">330 ml</div>
        <div class="add-label">Canette</div>
      </button>
      <button class="btn-add" onclick="ajouterEau(500)">
        <div class="add-ml">500 ml</div>
        <div class="add-label">Bouteille</div>
      </button>
    </div>

    <div class="btn-custom">
      <span style="font-size:20px;">✏️</span>
      <input type="number" id="custom-input" class="custom-input" 
      placeholder="Quantité en ml..." min="1" max="5000" inputmode="numeric">
      <button class="btn-add-custom" onclick="ajouterPersonnalise()">Ajouter</button>
    </div>

    <div class="history-header">
      <div class="section-title" style="margin:0">Aujourd'hui</div>
      <button class="btn-reset" onclick="resetJour()">Réinitialiser</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty">Aucune entrée pour aujourd'hui 💧</div>
    </div>
  </div>

  <div id="modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">⚙️ Paramètres</div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Objectif journalier</div>
          <div class="setting-desc">En millilitres (recommandé : 2000 ml)</div>
        </div>
        <input type="number" id="input-objectif" class="setting-input"
          min="500" max="10000" step="100" inputmode="numeric">
      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Rappels toutes les</div>
          <div class="setting-desc">Fréquence des notifications</div>
        </div>
        <select id="select-rappel" class="setting-select">
          <option value="0.5">30 min</option>
          <option value="1">1 heure</option>
          <option value="1.5">1h30</option>
          <option value="2" selected>2 heures</option>
          <option value="3">3 heures</option>
          <option value="4">4 heures</option>
        </select>
      </div>

      <button
        onclick="sauvegarderSettings()"
        style="width:100%;background:var(--water);color:var(--bg);border:none;border-radius:14px;padding:16px;font-family:var(--sans);font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;"
      >
        Sauvegarder
      </button>

      <button id="btn-notif" class="btn-notif" onclick="demanderNotifications()">
        🔔 Activer les rappels
      </button>

    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
